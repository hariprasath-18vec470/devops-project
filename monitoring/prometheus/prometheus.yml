global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

scrape_configs:

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx-exporter:9113']
    metrics_path: /metrics

  - job_name: 'devops-webapp-dev'
    static_configs:
      - targets: ['nginx-exporter:9113']
    relabel_configs:
      - target_label: environment
        replacement: dev

  - job_name: 'devops-webapp-staging'
    static_configs:
      - targets: ['nginx-exporter:9113']
    relabel_configs:
      - target_label: environment
        replacement: staging

  - job_name: 'devops-webapp-prod'
    static_configs:
      - targets: ['nginx-exporter:9113']
    relabel_configs:
      - target_label: environment
        replacement: production