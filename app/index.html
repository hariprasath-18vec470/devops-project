<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DevOps Pipeline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }
    .container {
      text-align: center;
      padding: 40px;
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.2);
      max-width: 700px;
      width: 90%;
    }
    h1 { font-size: 2.5rem; margin-bottom: 10px; color: #e94560; }
    .env-badge {
      display: inline-block;
      padding: 8px 25px;
      border-radius: 25px;
      font-size: 1rem;
      font-weight: bold;
      margin: 15px 0;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .dev    { background: #2ecc71; color: #000; }
    .staging { background: #f39c12; color: #000; }
    .prod   { background: #e94560; color: #fff; }
    .badge {
      display: inline-block;
      background: rgba(255,255,255,0.2);
      padding: 5px 15px;
      border-radius: 20px;
      font-size: 0.85rem;
      margin: 5px;
    }
    .stages {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin: 20px 0;
      flex-wrap: wrap;
    }
    .stage {
      background: rgba(255,255,255,0.1);
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 0.85rem;
    }
    .arrow { font-size: 1.2rem; color: #e94560; }
    .info { margin-top: 15px; font-size: 1rem; opacity: 0.85; }
    .version { margin-top: 15px; font-size: 0.85rem; opacity: 0.6; }
    .status {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 15px;
      flex-wrap: wrap;
    }
    .status-item { font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚀 DevOps Pipeline</h1>
    <p>Multi-Stage CI/CD Successfully Deployed!</p>

    <div class="env-badge prod">Production Environment</div>

    <div class="stages">
      <div class="stage">🔧 Dev</div>
      <div class="arrow">→</div>
      <div class="stage">🧪 Staging</div>
      <div class="arrow">→</div>
      <div class="stage">🚀 Production</div>
    </div>

    <div>
      <span class="badge">Docker</span>
      <span class="badge">Jenkins</span>
      <span class="badge">GitHub</span>
      <span class="badge">Nginx</span>
      <span class="badge">Prometheus</span>
      <span class="badge">Grafana</span>
    </div>

    <div class="status">
      <div class="status-item">✅ Build Passed</div>
      <div class="status-item">✅ Dev Passed</div>
      <div class="status-item">✅ Staging Passed</div>
      <div class="status-item">✅ Prod Deployed</div>
    </div>

    <div class="version">
      Version: 3.0.0 | Multi-Stage Pipeline | Build: Latest
    </div>
  </div>
</body>
</html>
